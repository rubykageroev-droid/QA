name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r auto-tests/requirements.txt
          playwright install chromium

      - name: Run UI tests
        run: pytest auto-tests/tests/test_ui.py -v

      - name: Run API tests
        run: pytest auto-tests/tests/test_api.py -v
